<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedLedger - Onboarding</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- GSAP & ScrollTrigger Core -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <link rel="stylesheet" href="unified-theme.css">
    <link rel="stylesheet" href="onboarding.css">
</head>
<body>
    <!-- ========================================= -->
    <!--  AMBIENT ANIMATED BACKGROUND (Fixed)      -->
    <!-- ========================================= -->
    <svg class="ambient-bg" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice"
        viewBox="0 0 1440 800">
        <defs>
            <filter id="glow-subtle" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="3" result="blur" />
                <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>
            <filter id="glow-heavy" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="8" result="blur" />
                <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>
            <filter id="blur-particle" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="15" />
            </filter>

            <!-- Lighter, softer strokes for the calm modern gradient -->
            <linearGradient id="grad-indigo-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#38bdf8" stop-opacity="0" />
                <stop offset="30%" stop-color="#38bdf8" stop-opacity="0.6" />
                <stop offset="70%" stop-color="#818cf8" stop-opacity="0.6" />
                <stop offset="100%" stop-color="#6ee7b7" stop-opacity="0" />
            </linearGradient>
            <linearGradient id="grad-cyan-indigo" x1="100%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#fdba74" stop-opacity="0" />
                <stop offset="40%" stop-color="#fdba74" stop-opacity="0.5" />
                <stop offset="60%" stop-color="#fbcfe8" stop-opacity="0.5" />
                <stop offset="100%" stop-color="#bae6fd" stop-opacity="0" />
            </linearGradient>
            <linearGradient id="grad-ecg" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#fdba74" stop-opacity="0" />
                <stop offset="25%" stop-color="#fdba74" stop-opacity="0.3" />
                <stop offset="50%" stop-color="#fb923c" stop-opacity="0.9" /> /* Soft Peach ECG spike */
                <stop offset="75%" stop-color="#38bdf8" stop-opacity="0.3" />
                <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
            </linearGradient>
        </defs>

        <!-- Base smooth ambient data lines -->
        <g filter="url(#glow-subtle)" opacity="0.6">
            <path class="animated-line line-flow-1" d="M-100,500 C200,450 400,650 700,400 S1100,200 1540,300"
                stroke="url(#grad-indigo-cyan)" stroke-width="1.5" />
            <path class="animated-line line-flow-2" d="M-100,250 C300,150 500,450 800,300 S1200,150 1540,200"
                stroke="url(#grad-cyan-indigo)" stroke-width="1" />
            <path class="animated-line line-flow-3" d="M-100,700 C250,750 600,600 900,650 S1300,800 1540,750"
                stroke="url(#grad-indigo-cyan)" stroke-width="2" />
        </g>

        <!-- Neural Nodes -->
        <g filter="url(#glow-subtle)" opacity="0.4">
            <path class="animated-line neural-connector" d="M300,250 L450,400 L700,300 L950,550" stroke="#38bdf8"
                stroke-width="1" opacity="0.5" />
            <path class="animated-line neural-connector" d="M450,400 L600,600 L800,300 L1100,200" stroke="#818cf8"
                stroke-width="1" opacity="0.3" />
            <path class="animated-line neural-connector" d="M700,300 L850,150 L1100,200" stroke="#2dd4bf"
                stroke-width="1" opacity="0.4" />

            <circle cx="300" cy="250" r="3" class="neural-node node-delay-1" />
            <circle cx="450" cy="400" r="4" class="neural-node node-delay-2" />
            <circle cx="700" cy="300" r="3" class="neural-node node-delay-3" />
            <circle cx="950" cy="550" r="4" class="neural-node node-delay-1" />
            <circle cx="600" cy="600" r="3" class="neural-node node-delay-2" />
            <circle cx="800" cy="300" r="4" class="neural-node node-delay-3" />
            <circle cx="1100" cy="200" r="3" class="neural-node node-delay-1" />
            <circle cx="850" cy="150" r="3" class="neural-node node-delay-2" />
        </g>

        <!-- Ambient ECG Highlight -->
        <g filter="url(#glow-heavy)" opacity="0.5">
            <path class="animated-line line-ecg"
                d="M-100,450 L300,450 L330,410 L360,530 L390,450 L650,450 C750,450 800,550 900,550 C1000,550 1050,450 1150,450 L1250,450 L1270,380 L1300,560 L1330,450 L1540,450"
                stroke="url(#grad-ecg)" stroke-width="2.5" />
        </g>

        <!-- Particles -->
        <g>
            <circle cx="20%" cy="80%" r="30" class="particle p1" />
            <circle cx="50%" cy="30%" r="40" class="particle p2" />
            <circle cx="80%" cy="70%" r="25" class="particle p3" />
            <circle cx="85%" cy="20%" r="45" class="particle p4" />
            <circle cx="35%" cy="50%" r="20" class="particle p5" />
        </g>
    </svg>

    <div class="vignette"></div>
    <!-- Onboarding Container -->
    <div class="onboarding-container">
        <!-- Animated Radial Light Overlays -->
        <!-- Floating Particles Background -->
        <div class="onboarding-particles">
            <div class="onboarding-particle"></div>
            <div class="onboarding-particle"></div>
            <div class="onboarding-particle"></div>
            <div class="onboarding-particle"></div>
            <div class="onboarding-particle"></div>
            <div class="onboarding-particle"></div>
        </div>

        <!-- Skip Button -->
        <a href="index.html" class="onboarding-skip">Skip</a>

        <!-- Glassmorphism Content Card -->
        <div class="onboarding-card">
            <!-- Card Content Container -->
            <div class="onboarding-card-content">
                <!-- Left Content -->
                <div class="onboarding-left-content">
                    <!-- Logo -->
                    <div class="onboarding-logo">
                        <svg viewBox="0 0 32 32" fill="none">
                            <rect width="32" height="32" rx="8" fill="white"/>
                            <path d="M8 16C8 11.5817 11.5817 8 16 8C20.4183 8 24 11.5817 24 16C24 20.4183 20.4183 24 16 24C11.5817 24 8 20.4183 8 16Z" fill="#1E5EFF"/>
                            <path d="M16 12C13.7909 12 12 13.7909 12 16C12 18.2091 13.7909 20 16 20C18.2091 20 20 18.2091 20 16C20 13.7909 18.2091 12 16 12Z" fill="white"/>
                        </svg>
                    </div>

                    <!-- Slides Container -->
                    <div class="onboarding-slides-container">
                        <!-- Slide 1: Voice to Clinical Clarity -->
                        <div class="onboarding-slide active" data-slide="1">
                            <!-- Icon -->
                            <div class="slide-icon">
                                <svg viewBox="0 0 64 64" fill="none">
                                    <circle cx="32" cy="32" r="32" fill="rgba(30, 94, 255, 0.2)"/>
                                    <path d="M32 16C32 16 32 24 32 32C32 40 24 48 16 48C24 48 32 40 32 32C32 24 32 16 32 16Z" fill="rgba(255, 255, 255, 0.8)"/>
                                    <rect x="28" y="8" width="8" height="16" rx="4" fill="rgba(255, 255, 255, 0.9)"/>
                                    <circle cx="32" cy="48" r="8" fill="rgba(255, 255, 255, 0.9)"/>
                                </svg>
                            </div>

                            <!-- Title -->
                            <h2 class="slide-title">Voice to Clinical Clarity</h2>

                            <!-- Description -->
                            <p class="slide-description">
                                Convert Hinglish consultations into structured SOAP notes instantly.
                            </p>
                        </div>

                        <!-- Slide 2: Immutable Audit Trail -->
                        <div class="onboarding-slide" data-slide="2">
                            <!-- Icon -->
                            <div class="slide-icon">
                                <svg viewBox="0 0 64 64" fill="none">
                                    <circle cx="32" cy="32" r="32" fill="rgba(46, 212, 122, 0.2)"/>
                                    <path d="M32 8L40 16L56 16L56 32L48 40L32 56L16 40L8 32L8 16L24 16L32 8Z" fill="rgba(255, 255, 255, 0.8)" stroke="rgba(255, 255, 255, 0.9)" stroke-width="2"/>
                                    <path d="M24 32L28 36L40 24" stroke="rgba(255, 255, 255, 0.9)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </div>

                            <!-- Title -->
                            <h2 class="slide-title">Immutable Audit Trail</h2>

                            <!-- Description -->
                            <p class="slide-description">
                                Every signed consultation becomes a secure hashed record.
                            </p>
                        </div>

                        <!-- Slide 3: Portable Patient History -->
                        <div class="onboarding-slide" data-slide="3">
                            <!-- Icon -->
                            <div class="slide-icon">
                                <svg viewBox="0 0 64 64" fill="none">
                                    <circle cx="32" cy="32" r="32" fill="rgba(147, 51, 234, 0.2)"/>
                                    <line x1="16" y1="32" x2="48" y2="32" stroke="rgba(255, 255, 255, 0.8)" stroke-width="3"/>
                                    <circle cx="24" cy="32" r="6" fill="rgba(255, 255, 255, 0.9)"/>
                                    <circle cx="32" cy="32" r="6" fill="rgba(255, 255, 255, 0.9)"/>
                                    <circle cx="40" cy="32" r="6" fill="rgba(255, 255, 255, 0.9)"/>
                                    <path d="M24 26V20M32 26V20M40 26V20" stroke="rgba(255, 255, 255, 0.9)" stroke-width="2" stroke-linecap="round"/>
                                    <path d="M24 38V44M32 38V44M40 38V44" stroke="rgba(255, 255, 255, 0.9)" stroke-width="2" stroke-linecap="round"/>
                                </svg>
                            </div>

                            <!-- Title -->
                            <h2 class="slide-title">Portable Patient History</h2>

                            <!-- Description -->
                            <p class="slide-description">
                                Emergency-ready summaries that travel with the patient.
                            </p>
                        </div>
                    </div>

                    <!-- Navigation Buttons -->
                    <div class="onboarding-navigation">
                        <button class="nav-btn prev-btn" onclick="previousSlide()" id="prevBtn" disabled>
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                                <path d="M12 5L7 10L12 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            Previous
                        </button>

                        <button class="nav-btn next-btn" onclick="nextSlide()" id="nextBtn">
                            Next
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                                <path d="M8 5L13 10L8 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                    </div>

                    <!-- Progress Indicators -->
                    <div class="onboarding-progress">
                        <div class="progress-dot active" onclick="goToSlide(1)"></div>
                        <div class="progress-dot" onclick="goToSlide(2)"></div>
                        <div class="progress-dot" onclick="goToSlide(3)"></div>
                    </div>

                    <!-- Get Started Button (only on last slide) -->
            <button class="onboarding-get-started-btn" id="getStartedBtn" onclick="enterWorkspace()" style="display: none;">
                Enter Workspace
            </button>
                </div>

                <!-- Right Illustration -->
                <div class="onboarding-illustration-side">
                    <div class="illustration-placeholder-animated">
                        <svg viewBox="0 0 200 200" fill="none">
                            <!-- Medical Cross Symbol -->
                            <rect x="85" y="40" width="30" height="120" rx="15" fill="rgba(46, 212, 122, 0.8)"/>
                            <rect x="40" y="85" width="120" height="30" rx="15" fill="rgba(46, 212, 122, 0.8)"/>
                            
                            <!-- Decorative Circles -->
                            <circle cx="50" cy="50" r="8" fill="rgba(30, 94, 255, 0.6)"/>
                            <circle cx="150" cy="50" r="8" fill="rgba(30, 94, 255, 0.6)"/>
                            <circle cx="50" cy="150" r="8" fill="rgba(30, 94, 255, 0.6)"/>
                            <circle cx="150" cy="150" r="8" fill="rgba(30, 94, 255, 0.6)"/>
                            
                            <!-- Connecting Lines -->
                            <line x1="50" y1="50" x2="85" y2="85" stroke="rgba(255, 255, 255, 0.3)" stroke-width="2"/>
                            <line x1="150" y1="50" x2="115" y2="85" stroke="rgba(255, 255, 255, 0.3)" stroke-width="2"/>
                            <line x1="50" y1="150" x2="85" y2="115" stroke="rgba(255, 255, 255, 0.3)" stroke-width="2"/>
                            <line x1="150" y1="150" x2="115" y2="115" stroke="rgba(255, 255, 255, 0.3)" stroke-width="2"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Onboarding Slide Management
        let currentSlide = 1;
        const totalSlides = 3;
        let isTransitioning = false;

        function showSlide(slideNumber, direction = 'forward') {
            if (isTransitioning || slideNumber === currentSlide) return;
            
            isTransitioning = true;
            
            const slides = document.querySelectorAll('.onboarding-slide');
            const progressDots = document.querySelectorAll('.progress-dot');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const getStartedBtn = document.getElementById('getStartedBtn');
            
            // Hide current slide
            const currentSlideElement = document.querySelector(`.onboarding-slide[data-slide="${currentSlide}"]`);
            const currentTitle = currentSlideElement.querySelector('.slide-title');
            const currentDescription = currentSlideElement.querySelector('.slide-description');
            const currentIcon = currentSlideElement.querySelector('.slide-icon');
            
            // Animate out current elements
            currentTitle.style.opacity = '0';
            currentTitle.style.transform = 'translateY(30px)';
            
            currentDescription.style.opacity = '0';
            currentDescription.style.transform = 'translateY(20px)';
            
            currentIcon.style.opacity = '0';
            currentIcon.style.transform = 'translateY(20px) scale(0.9)';
            
            currentSlideElement.style.opacity = '0';
            
            if (direction === 'forward') {
                currentSlideElement.style.transform = 'translateX(-100px)';
            } else {
                currentSlideElement.style.transform = 'translateX(100px)';
            }
            
            // Remove active class from current elements
            currentSlideElement.classList.remove('active');
            progressDots[currentSlide - 1].classList.remove('active');
            
            // Update current slide
            currentSlide = slideNumber;
            
            // Show new slide after a short delay
            setTimeout(() => {
                const newSlideElement = document.querySelector(`.onboarding-slide[data-slide="${currentSlide}"]`);
                const newTitle = newSlideElement.querySelector('.slide-title');
                const newDescription = newSlideElement.querySelector('.slide-description');
                const newIcon = newSlideElement.querySelector('.slide-icon');
                
                // Set initial position for new slide
                if (direction === 'forward') {
                    newSlideElement.style.transform = 'translateX(100px)';
                } else {
                    newSlideElement.style.transform = 'translateX(-100px)';
                }
                newSlideElement.style.opacity = '0';
                
                // Set initial positions for new elements
                newTitle.style.opacity = '0';
                newTitle.style.transform = 'translateY(30px)';
                
                newDescription.style.opacity = '0';
                newDescription.style.transform = 'translateY(20px)';
                
                newIcon.style.opacity = '0';
                newIcon.style.transform = 'translateY(20px) scale(0.9)';
                
                // Make new slide visible
                newSlideElement.classList.add('active');
                
                // Animate slide in
                setTimeout(() => {
                    newSlideElement.style.transform = 'translateX(0)';
                    newSlideElement.style.opacity = '1';
                }, 50);
                
                // Staggered reveal animation
                setTimeout(() => {
                    newIcon.style.opacity = '1';
                    newIcon.style.transform = 'translateY(0) scale(1)';
                }, 150);
                
                setTimeout(() => {
                    newTitle.style.opacity = '1';
                    newTitle.style.transform = 'translateY(0)';
                }, 300);
                
                setTimeout(() => {
                    newDescription.style.opacity = '1';
                    newDescription.style.transform = 'translateY(0)';
                }, 450);
                
                // Update progress dots with animation
                progressDots[currentSlide - 1].classList.add('active');
                
                // Add a brief animation trigger for active dot
                const activeDot = progressDots[currentSlide - 1];
                activeDot.style.animation = 'none';
                setTimeout(() => {
                    activeDot.style.animation = 'dotPulse 2s ease-in-out infinite';
                }, 100);
                
                // Update navigation buttons
                prevBtn.disabled = currentSlide === 1;
                
                if (currentSlide === totalSlides) {
                    nextBtn.style.display = 'none';
                    getStartedBtn.style.display = 'block';
                } else {
                    nextBtn.style.display = 'flex';
                    getStartedBtn.style.display = 'none';
                }
                
                // Re-enable transitions
                setTimeout(() => {
                    isTransitioning = false;
                }, 600);
            }, 200);
        }

        function nextSlide() {
            if (currentSlide < totalSlides) {
                showSlide(currentSlide + 1, 'forward');
            }
        }

        function previousSlide() {
            if (currentSlide > 1) {
                showSlide(currentSlide - 1, 'backward');
            }
        }

        function goToSlide(slideNumber) {
            if (slideNumber > currentSlide) {
                showSlide(slideNumber, 'forward');
            } else if (slideNumber < currentSlide) {
                showSlide(slideNumber, 'backward');
            }
        }

        function getStarted() {
            // Navigate to main app
            window.location.href = 'index.html';
        }

        function enterWorkspace() {
            // Cinematic transition to dashboard
            const container = document.querySelector('.onboarding-container');
            const card = document.querySelector('.onboarding-card');
            const particles = document.querySelector('.onboarding-particles');
            
            // Start cinematic transition
            container.style.transition = 'all 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
            card.style.transition = 'all 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
            particles.style.transition = 'all 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
            
            // Fade out and scale down
            container.style.opacity = '0';
            container.style.transform = 'scale(0.95)';
            card.style.transform = 'scale(0.9) translateY(20px)';
            card.style.opacity = '0';
            particles.style.opacity = '0';
            
            // Navigate after transition completes
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 600);
        }

        // Add keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                if (currentSlide === totalSlides) {
                    enterWorkspace();
                } else {
                    nextSlide();
                }
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                previousSlide();
            } else if (e.key === 'Escape') {
                window.location.href = 'index.html';
            }
        });

        // Add touch/swipe support for mobile
        let touchStartX = 0;
        let touchEndX = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {
            const swipeThreshold = 50;
            const diff = touchStartX - touchEndX;
            
            if (Math.abs(diff) > swipeThreshold) {
                if (diff > 0) {
                    // Swipe left - next slide
                    if (currentSlide === totalSlides) {
                        enterWorkspace();
                    } else {
                        nextSlide();
                    }
                } else {
                    // Swipe right - previous slide
                    previousSlide();
                }
            }
        }

        // Initialize slide animations on load
        document.addEventListener('DOMContentLoaded', () => {
            const firstSlide = document.querySelector('.onboarding-slide.active');
            if (firstSlide) {
                const firstIcon = firstSlide.querySelector('.slide-icon');
                const firstTitle = firstSlide.querySelector('.slide-title');
                const firstDescription = firstSlide.querySelector('.slide-description');
                
                // Set initial states
                firstIcon.style.opacity = '0';
                firstIcon.style.transform = 'translateY(20px) scale(0.9)';
                
                firstTitle.style.opacity = '0';
                firstTitle.style.transform = 'translateY(30px)';
                
                firstDescription.style.opacity = '0';
                firstDescription.style.transform = 'translateY(20px)';
                
                // Animate in on load
                setTimeout(() => {
                    firstIcon.style.opacity = '1';
                    firstIcon.style.transform = 'translateY(0) scale(1)';
                }, 300);
                
                setTimeout(() => {
                    firstTitle.style.opacity = '1';
                    firstTitle.style.transform = 'translateY(0)';
                }, 450);
                
                setTimeout(() => {
                    firstDescription.style.opacity = '1';
                    firstDescription.style.transform = 'translateY(0)';
                }, 600);
            }
            
            // Initialize parallax effect
            initParallax();
            
            // Initialize ripple effects
            initRippleEffects();
        });

        // Parallax card tilt effect
        function initParallax() {
            const card = document.querySelector('.onboarding-card');
            
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                const rotateX = ((y - centerY) / centerY) * -5;
                const rotateY = ((x - centerX) / centerX) * 5;
                
                card.style.setProperty('--tilt-x', `${rotateX}deg`);
                card.style.setProperty('--tilt-y', `${rotateY}deg`);
                card.classList.add('tilt');
            });
            
            card.addEventListener('mouseleave', () => {
                card.style.setProperty('--tilt-x', '0deg');
                card.style.setProperty('--tilt-y', '0deg');
                card.classList.remove('tilt');
            });
        }

        // Ripple effect for buttons
        function initRippleEffects() {
            const buttons = document.querySelectorAll('.nav-btn, .onboarding-get-started-btn');
            
            buttons.forEach(button => {
                button.addEventListener('click', function(e) {
                    const ripple = document.createElement('span');
                    const rect = this.getBoundingClientRect();
                    const size = Math.max(rect.width, rect.height);
                    const x = e.clientX - rect.left - size / 2;
                    const y = e.clientY - rect.top - size / 2;
                    
                    ripple.style.width = ripple.style.height = size + 'px';
                    ripple.style.left = x + 'px';
                    ripple.style.top = y + 'px';
                    ripple.classList.add('ripple');
                    
                    this.appendChild(ripple);
                    
                    setTimeout(() => {
                        ripple.remove();
                    }, 600);
                });
            });
        }
    </script>
    
    <script>
        gsap.registerPlugin(ScrollTrigger);

        /* 1. SCROLL REVEAL (For Onboarding Elements) */
        const elements = document.querySelectorAll('.onboarding-slide, .onboarding-card');

        window.addEventListener('scroll', () => {
            const trigger = window.innerHeight * 0.85;

            elements.forEach(el => {
                const top = el.getBoundingClientRect().top;
                if (top < trigger) {
                    el.classList.add('fade-up');
                    el.classList.add('show');
                }
            });
        });

        // Trigger on load for top elements
        window.dispatchEvent(new Event('scroll'));
    </script>
</body>
</html>
